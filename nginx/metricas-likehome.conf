# ─────────────────────────────────────────────────────────────
#  Nginx — Métricas LikeHome
#  Copie para: /etc/nginx/sites-available/metricas-likehome
#  Ative com:  ln -s /etc/nginx/sites-available/metricas-likehome \
#                      /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────
#
# Para HTTPS com Let's Encrypt, execute após ativar o site:
#   certbot --nginx -d metricas.seudominio.com.br
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name metricas.seudominio.com.br;   # ← altere para o seu domínio/IP

    # Arquivos estáticos do frontend (build do Vite)
    root /opt/metricas-likehome/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets imutáveis (hash no nome)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy da API para o Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check da API
    location /health {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        access_log off;
    }

    # SPA — todas as rotas retornam o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
